<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EdTech Frontend Test</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./assets/css/style.css" />
  </head>
  <body>
    <!-- Hero principal do teste técnico. Mantido isolado para facilitar ajustes finos de layout. -->
    <header class="hero">
      <div class="hero-background" aria-hidden="true">
        <img
          class="hero-background__curves"
          src="./assets/images/SVG.png"
          alt=""
        />
        <span class="hero-background__circle"></span>
      </div>
      <div class="container hero-layout">
        <div class="hero-text">
          <div class="hero-text__accent-bar" aria-hidden="true"></div>
          <h1 class="hero-text__title">
            Lorem ipsum<br />dolor, sit <span>amet</span>
          </h1>
          <p class="hero-text__description">
            It is a long established fact that a reader will be distracted by
            the readable content of a page when looking at its layout.
          </p>
          <a class="button button--accent" href="#conteudo">
            <span>Lorem Ipsum</span>
            <span aria-hidden="true">&#8594;</span>
          </a>
        </div>

        <div class="hero-visual" aria-hidden="true"></div>
      </div>
    </header>
  </body>
</html>
